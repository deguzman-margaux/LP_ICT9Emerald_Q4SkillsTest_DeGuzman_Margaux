<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body{
            background-color: #0b152e;
            font-family: 'Courier New', Courier, monospace;
            color: #333;
            margin-top: 80px;
        }
        .container{
            margin-top: 50px;
            
        }
        .main-card {
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            border: 2px solid #93b0f9;
            background-color: #2c3b61;
            box-shadow: 0 0 25px 8px rgba(147, 171, 249, 0.5); 
        }
        h2{
            text-align: center;
            margin-top: 10px;
            color: #f8f8f2;
        }
        img{
            color: #f8f8f2;
        }
        .form-label{
            color: #f8f8f2;
        }
        .form-check-label{
            color: #c6c6c6;
        }
    </style>
</head>
<body>

    <div class="container w-100 mx-auto d-flex justify-content-center align-items-center">
        <div class="row">
            <div class="col-md-9">
                <div class="card main-card">
                    <img src="profile.png" alt="logo" height="100px" width="100px"class="rounded d-block mx-auto mb-3">
                    <h2>Login</h2>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="Enter username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        
                        <div class="form-check mb-3">
                            <input type="checkbox" class="form-check-input" id="stayLogged">
                            <label class="form-check-label" for="stayLogged">Stay logged in</label>
                            <div class="form-check-label" style="font-size: 0.75rem;">
                                Your session will stay active on this device.
                            </div>
                        </div>

                        <div id="statusMessage" class="text-center mb-3" style="color: #ff6b6b; font-weight: bold;"></div>
                    
                        <div class="d-grid gap-2">
                            <button type="button" onclick="authenticate()" class="btn btn-primary">Login</button>
                            <button type="reset" class="btn btn-outline-secondary">Cancel</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="https://www.w3schools.com" target="_blank" class="text-decoration-none small">Forgot username / password?</a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        function authenticate() {
            const correctUser = "sampleuser67"; 
            const correctPass = "password123";
            let attempts = 0
            const maxAttempts = 3

            let inputUser = document.getElementById('username').value;
            let inputPass = document.getElementById('password').value;
            let statusDiv = document.getElementById('statusMessage');

            if (attempts >= maxAttempts){
                statusDiv.innerHTML = "Access Denied: Account locked.";
                return;
            }

            if (inputUser === correctUser && inputPass === correctPass) {
                window.alert("Welcome " + inputUser + "!");
                window.location.href = "notebooks.html";
            } else {
                attempts++;
                let attempts = attempts;

                if (remaining = 0){
                    statusDiv.innerHTML = "Invalid login." + attempts + "out of 3 left"
                } else{
                    statusDiv.innerHTML = "0 tries left. Access blocked"
                }
            }
        }
    </script>
    
</body>
</html>
